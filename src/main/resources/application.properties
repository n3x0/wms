# Nombre de la aplicación
spring.application.name=wms

# Datasource Oracle
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@oracle:1521/XEPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:wms}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:wms}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Pool de conexiones (opcional)
spring.datasource.init-mode=always
spring.datasource.test-on-borrow=true
spring.datasource.validation-query=SELECT 1 FROM DUAL